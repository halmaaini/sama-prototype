<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SAMA · Student Activities Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --ink: #0e1014;
    --ink-2: #20242c;
    --mute: #5b6472;
    --mute-2: #8790a0;
    --line: #e8eaef;
    --line-2: #eef0f4;
    --bg: #f7f7f5;
    --surface: #ffffff;
    --sunk: #f1f2ef;
    --accent: #3a3dd9;       /* deep indigo */
    --accent-ink: #1f209a;
    --accent-wash: #ecedff;
    --ok: #137a4a;
    --ok-wash: #e4f4ea;
    --warn: #a4620a;
    --warn-wash: #fcefd6;
    --bad: #b42318;
    --bad-wash: #fde7e3;
    --lilac: #7b5dea;
    --teal: #0a7a78;
    --amber: #b9812d;
    --rose: #b43664;
    --slate: #495266;
  }
  html,body{background:var(--bg);color:var(--ink);}
  body{font-family:"Inter Tight",ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11";}
  .font-serif{font-family:"Instrument Serif",ui-serif,Georgia,serif;font-weight:400;letter-spacing:-0.01em;}
  .font-mono{font-family:"JetBrains Mono",ui-monospace,monospace;}
  .hairline{border-color:var(--line);}
  .hairline-2{border-color:var(--line-2);}
  /* scrollbars */
  .thin-scroll::-webkit-scrollbar{width:10px;height:10px;}
  .thin-scroll::-webkit-scrollbar-thumb{background:#d9dce3;border:3px solid transparent;background-clip:content-box;border-radius:10px;}
  .thin-scroll::-webkit-scrollbar-thumb:hover{background:#b9bdc7;background-clip:content-box;border:3px solid transparent;}
  .no-scroll::-webkit-scrollbar{display:none;}
  /* focus ring */
  .ring-accent{box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--accent);}
  /* animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .anim-fade-up{animation:fadeUp .28s ease-out both;}
  @keyframes pulseDot{0%,100%{opacity:.35}50%{opacity:1}}
  .pulse-dot{animation:pulseDot 1.6s ease-in-out infinite;}
  @keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
  .shimmer{background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);background-size:200% 100%;animation:shimmer 2s linear infinite;}
  /* dotted paper */
  .paper{
    background-image: radial-gradient(#dcdfe6 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: -11px -11px;
  }
  /* subtle diagonal for placeholders */
  .stripe-placeholder{
    background-image: repeating-linear-gradient(135deg, rgba(14,16,20,.05) 0 1px, transparent 1px 10px);
  }
  /* soft shadow */
  .shadow-soft{box-shadow: 0 1px 0 rgba(14,16,20,.03), 0 1px 2px rgba(14,16,20,.04), 0 8px 24px -12px rgba(14,16,20,.08);}
  .shadow-lift{box-shadow: 0 1px 0 rgba(14,16,20,.03), 0 8px 30px -12px rgba(14,16,20,.18);}
  .shadow-float{box-shadow: 0 24px 60px -20px rgba(14,16,20,.35), 0 10px 24px -16px rgba(14,16,20,.2);}
  .inset-line{box-shadow: inset 0 -1px 0 var(--line);}
  input[type=checkbox]:focus, input[type=text]:focus, input[type=search]:focus, textarea:focus, select:focus{outline:none;}
  /* hide default number spinner */
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .chip{display:inline-flex;align-items:center;gap:.35rem;padding:.125rem .5rem;border-radius:999px;font-size:11px;line-height:1rem;font-weight:500;}
  .kbd{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:10px;line-height:1;padding:3px 5px;border-radius:4px;background:#eff0f3;color:#5b6472;border:1px solid #e2e4e9;box-shadow:0 1px 0 #e2e4e9;}
  .divider-dot::before{content:"·";margin:0 .45rem;color:#c2c7d0;}
  details > summary{list-style:none;cursor:pointer;}
  details > summary::-webkit-details-marker{display:none;}
  .grid-lines{background-image:linear-gradient(var(--line-2) 1px, transparent 1px), linear-gradient(90deg, var(--line-2) 1px, transparent 1px); background-size: 24px 24px;}
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="./lib/icons.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/data.jsx"></script>

  <script type="text/babel" data-presets="react" src="./lib/hub.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/create.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/detail.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/approvals.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/modules.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/people.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/reports.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/notifications.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/student.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/health.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/counselor.jsx"></script>
  <script type="text/babel" data-presets="react" src="./lib/app.jsx"></script>
</body>
</html>
